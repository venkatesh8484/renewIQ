replicaCount: 2

image:
  repository: renewiqacr.azurecr.io/renewiq-api
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
  hosts:
    - host: api.renewiq.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 10

# Databricks credentials — injected from Kubernetes Secret at deploy time
env:
  - name: DATABRICKS_HOST
    valueFrom:
      secretKeyRef:
        name: renewiq-secrets
        key: databricks-host
  - name: DATABRICKS_TOKEN
    valueFrom:
      secretKeyRef:
        name: renewiq-secrets
        key: databricks-token
  - name: LLM_BACKEND
    value: "databricks"
  - name: REDIS_URL
    value: "redis://renewiq-redis:6379"
  - name: LOG_LEVEL
    value: "INFO"
